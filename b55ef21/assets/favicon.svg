<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Curveball">
  <!-- Curved motion trail (graphite, dashed) -->
  <path d="M4 50 Q 20 14 50 18"
        fill="none"
        stroke="#1f2937"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-dasharray="3 5"
        opacity="0.55"/>
  <!-- Baseball -->
  <g transform="translate(44 22)">
    <circle r="14" fill="#fafaf5" stroke="#1f2937" stroke-width="1.5"/>
    <!-- Two red stitch arcs -->
    <path d="M -10 -6 Q 0 0 10 -6"
          fill="none"
          stroke="#b91c1c"
          stroke-width="1.8"
          stroke-linecap="round"/>
    <path d="M -10 6 Q 0 0 10 6"
          fill="none"
          stroke="#b91c1c"
          stroke-width="1.8"
          stroke-linecap="round"/>
    <!-- Stitch ticks -->
    <g stroke="#b91c1c" stroke-width="1.2" stroke-linecap="round">
      <line x1="-9"  y1="-5" x2="-10" y2="-8"/>
      <line x1="-4"  y1="-3" x2="-4"  y2="-6"/>
      <line x1="1"   y1="-3" x2="1"   y2="-6"/>
      <line x1="6"   y1="-4" x2="7"   y2="-7"/>
      <line x1="-9"  y1="5"  x2="-10" y2="8"/>
      <line x1="-4"  y1="3"  x2="-4"  y2="6"/>
      <line x1="1"   y1="3"  x2="1"   y2="6"/>
      <line x1="6"   y1="4"  x2="7"   y2="7"/>
    </g>
  </g>
</svg>
